{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agendamento | SmartRoutine</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{
background:#0f172a;
color:white;
font-family:'Inter';
}

/* HEADER */

header{
background:#0b2540;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,.4);
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:700;
font-size:20px;
}

.logo img {
  width: 80px;   /* antes era 30px */
  height: auto;
}

/* CONTAINER */

.main-container{
padding-top:40px;
padding-bottom:60px;
}

/* CARD */

.card-agendamento{

background:#111827;

border-radius:15px;

padding:30px;

box-shadow:0 20px 60px rgba(0,0,0,.5);

}

/* INPUT */

.form-control{

background:#1e293b;
border:none;
color:white;

}

.form-control:focus{

background:#1e293b;
color:white;
border:1px solid #22d3ee;
box-shadow:0 0 10px rgba(34,211,238,.4);

}

/* BOTÃO */

.btn-primary{

background:#22d3ee;
border:none;
color:#0f172a;
font-weight:600;

}

.btn-primary:hover{

background:#06b6d4;

}

/* HORÁRIOS */

.horario{

padding:12px;

border-radius:10px;

background:#1e293b;

margin-bottom:10px;

cursor:pointer;

transition:.2s;

text-align:center;

}

.horario:hover{

background:#22d3ee;
color:black;

}

.horario.selected{

background:#22d3ee;
color:black;

}

.horario.ocupado{

background:#374151;
color:#777;
cursor:not-allowed;

}

</style>

</head>

<body>


{% load static %}

<header>
  <div class="logo">
    <img src="{% static 'agendamento/logo-icon.png' %}" alt="SmartRoutine">
    SmartRoutine
  </div>
</header>


<div class="container main-container">

<div class="row justify-content-center">

<div class="col-lg-10">

<div class="card-agendamento">

<h3 class="mb-4">
<i class="bi bi-calendar-check"></i>
Agendar Lavagem
</h3>


<form method="POST">

{% csrf_token %}


<div class="row">

  <div class="col-md-6 mb-3">

<label>Data</label>

<input type="date"
name="data"
class="form-control"
required
value="{{ request.GET.data }}"
onchange="window.location='?data=' + this.value">

</div>

<div class="col-md-6 mb-3">

<label>Nome</label>
<input
    type="text"
    name="nome"
    class="form-control"
    required
    value="{{ request.GET.nome }}"
>
</div>

<div class="col-md-6 mb-3">

<label>Email</label>
<input
    type="email"
    name="email"
    class="form-control"
    required
    value="{{ request.GET.email }}"
>

</div>

<div class="col-md-6 mb-3">

<label>WhatsApp</label>
<input
    type="text"
    name="whatsapp"
    class="form-control"
    required
    value="{{ request.GET.whatsapp }}"
>

</div>

<div class="col-md-6 mb-3">

<label>Placa do veículo</label>
<input
    type="text"
    name="placa"
    class="form-control"
    required
    value="{{ request.GET.placa}}"
>

</div>


{% if erro %}
<div class="alert alert-danger">
    {{ erro }}
</div>
{% endif %}

</div>

<div class="col-md-6 mb-3">
  <label>Tipo de Lavagem</label>
  <select name="tipo_lavagem" class="form-select" required>
    <option value="">Selecione</option>
    {% for t in tipos %}
      <option value="{{ t.id }}">{{ t.nome }} — R$ {{ t.valor }}</option>
    {% endfor %}
  </select>
</div>

<div class="mb-3">

<label class="form-label">Horários disponíveis</label>

<select name="horario" class="form-select" required>

<option value="">Selecione um horário</option>

{% for horario in horarios %}

<option value="{{ horario.id }}">
{{ horario.hora|time:"H:i" }}
</option>

{% empty %}

<option disabled>
Nenhum horário disponível
</option>

{% endfor %}

</select>

</div>

<button class="btn btn-primary w-100 mt-4">

Confirmar Agendamento

</button>


</form>


</div>

</div>

</div>

</div>

<script>
function atualizarHorarios(){

    const nome = document.querySelector('[name="nome"]').value;
    const email = document.querySelector('[name="email"]').value;
    const whatsapp = document.querySelector('[name="whatsapp"]').value;
    const placa = document.querySelector('[name="placa"]').value;
    const data = document.querySelector('[name="data"]').value;

    const params = new URLSearchParams();

    params.set('data', data);
    params.set('nome', nome);
    params.set('email', email);
    params.set('whatsapp', whatsapp);
    params.set('placa', placa);

    window.location.search = params.toString();
}
</script>

<script>

function atualizarHorarios(data){

    const params = new URLSearchParams(window.location.search);

    params.set('data', data);

    window.location.search = params.toString();

}

</script>
<script>

document.querySelectorAll('.horario').forEach(el=>{

el.addEventListener('click',()=>{

if(el.classList.contains('ocupado')) return;

document.querySelectorAll('.horario').forEach(e=>e.classList.remove('selected'));

el.classList.add('selected');

});

});

</script>


</body>
</html>
